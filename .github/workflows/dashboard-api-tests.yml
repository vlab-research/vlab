name: Dashboard Api Tests
on:
  push:
    paths:
      - "dashboard-api/**"

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-20.04
    env:
      working-directory: ./dashboard-api
    steps:
      - uses: actions/checkout@v2
      - name: Tests
        run: ./test.sh --is-ci
        working-directory: ${{env.working-directory}}
