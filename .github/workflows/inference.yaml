name: inference

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'inference/**'
      - '.github/workflows/inference.yaml'
  push:
    branches: [main]
    paths:
      - 'inference/**'
      - '.github/workflows/inference.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: inference
    env:
      PG_URL: postgres://root@localhost:5433/test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '^1.18'
      - run: make test-db
      - run: make test

  build-push:
    if: github.event_name == 'push'
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: source-typeform
            app_path: sources/typeform
          - image: source-alchemer
            app_path: sources/alchemer
          - image: source-fly
            app_path: sources/fly
          - image: source-qualtrics
            app_path: sources/qualtrics
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: inference
          push: true
          tags: ghcr.io/vlab-research/${{ matrix.image }}:latest
          build-args: APP_PATH=${{ matrix.app_path }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
