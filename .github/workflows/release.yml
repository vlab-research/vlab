name: release

on:
  push:
    tags:
      - '*-v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"
          SERVICE="${TAG%-v*}"
          VERSION="v${TAG##*-v}"
          echo "service=$SERVICE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve build context, image name, and build args
        id: resolve
        run: |
          case "${{ steps.parse.outputs.service }}" in
            api)        CTX=api        ; IMG=vlab-dashboard-api ;;
            adopt)      CTX=adopt      ; IMG=adopt              ;;
            typeform)   CTX=inference  ; IMG=source-typeform    ; ARGS="APP_PATH=sources/typeform"  ;;
            alchemer)   CTX=inference  ; IMG=source-alchemer    ; ARGS="APP_PATH=sources/alchemer"  ;;
            fly-source) CTX=inference  ; IMG=source-fly         ; ARGS="APP_PATH=sources/fly"       ;;
            *)
              echo "Unknown service '${{ steps.parse.outputs.service }}' — add it to .github/workflows/release.yml" >&2
              exit 1
              ;;
          esac
          echo "context=$CTX"      >> "$GITHUB_OUTPUT"
          echo "image=$IMG"        >> "$GITHUB_OUTPUT"
          echo "build_args=$ARGS"  >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ${{ steps.resolve.outputs.context }}
          push: true
          tags: ghcr.io/vlab-research/${{ steps.resolve.outputs.image }}:${{ steps.parse.outputs.version }}
          build-args: ${{ steps.resolve.outputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
