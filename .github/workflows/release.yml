name: release

on:
  push:
    tags:
      - '*-v[0-9]+.[0-9]+.[0-9]+'
  # Manual rerun against an existing tag — pick the tag in the "Use workflow from" ref selector.
  # The job parses GITHUB_REF_NAME, which equals the tag name for both push and dispatch.
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"
          SERVICE="${TAG%-v*}"
          VERSION="v${TAG##*-v}"
          echo "service=$SERVICE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve build context, image name, and build args
        id: resolve
        run: |
          # api/Dockerfile expects the repo root as context (it COPYs both api/ and inference/),
          # so api uses CTX=. with an explicit dockerfile path. Inference-based services share
          # one parameterized Dockerfile at inference/Dockerfile, selected via APP_PATH.
          case "${{ steps.parse.outputs.service }}" in
            # Tag prefix matches image name so it's obvious which image a tag publishes.
            # api keeps its legacy short name (image is vlab-dashboard-api for historical reasons).
            api)              CTX=.          ; DOCKERFILE=api/Dockerfile        ; IMG=vlab-dashboard-api ;;
            adopt)            CTX=adopt      ; DOCKERFILE=adopt/Dockerfile      ; IMG=adopt              ;;
            source-typeform)  CTX=inference  ; DOCKERFILE=inference/Dockerfile  ; IMG=source-typeform    ; ARGS="APP_PATH=sources/typeform"  ;;
            source-alchemer)  CTX=inference  ; DOCKERFILE=inference/Dockerfile  ; IMG=source-alchemer    ; ARGS="APP_PATH=sources/alchemer"  ;;
            source-fly)       CTX=inference  ; DOCKERFILE=inference/Dockerfile  ; IMG=source-fly         ; ARGS="APP_PATH=sources/fly"       ;;
            source-qualtrics) CTX=inference  ; DOCKERFILE=inference/Dockerfile  ; IMG=source-qualtrics   ; ARGS="APP_PATH=sources/qualtrics" ;;
            swoosh)           CTX=inference  ; DOCKERFILE=inference/Dockerfile  ; IMG=swoosh             ; ARGS="APP_PATH=swoosh"            ;;
            # vlab-migrations bakes golang-migrate + devops/migrations/*.sql into a
            # versioned image, run by the chart's pre-upgrade hook. Build context is
            # the migrations dir itself; the SQL stays put (no ConfigMap glob).
            vlab-migrations)  CTX=devops/migrations ; DOCKERFILE=devops/migrations/Dockerfile ; IMG=vlab-migrations ;;
            *)
              echo "Unknown service '${{ steps.parse.outputs.service }}' — add it to .github/workflows/release.yml" >&2
              exit 1
              ;;
          esac
          echo "context=$CTX"         >> "$GITHUB_OUTPUT"
          echo "dockerfile=$DOCKERFILE" >> "$GITHUB_OUTPUT"
          echo "image=$IMG"           >> "$GITHUB_OUTPUT"
          echo "build_args=$ARGS"     >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ${{ steps.resolve.outputs.context }}
          file: ${{ steps.resolve.outputs.dockerfile }}
          push: true
          tags: ghcr.io/vlab-research/${{ steps.resolve.outputs.image }}:${{ steps.parse.outputs.version }}
          build-args: ${{ steps.resolve.outputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
