versionAdopt: &vadopt v0.1.70

env:
  - name: AUTH0_DOMAIN
    value: "https://vlab-pro.us.auth0.com/"
  - name: AUTH0_AUDIENCE
    value: "https://api-pro.vlab/"

# get secret names in vprod
envSecrets:
  - gbv-bot-envs
  - vlab-db-envs
  - vlab-typeform-envs
  - facebook-envs
  - vlab-api-key-envs

# shared ingress stuff
ingress:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod


services:
  - name: dashboard
    replicaCount: 1
    image:
      repository: ghcr.io/vlab-research/vlab-dashboard-api
      tag: v0.1.0
      pullPolicy: Always
    resources: {}
    ingress:
      host: vlab-dashboard-api.toixo.vlab.digital
    containerPort: 8080
    env:
      - name: API_HOST
        value: "0.0.0.0"
      - name: API_PORT
        value: "8080"

  - name: conf-dashboard
    replicaCount: 1
    image:
      repository: ghcr.io/vlab-research/adopt
      tag: *vadopt
      pullPolicy: Always
    resources: {}
    ingress:
      host: vlab-study-conf-api.toixo.vlab.digital
    containerPort: 8000
    args:
      - uvicorn
      - adopt.server.server:app
      - "--host=0.0.0.0"
      - "--workers=4"
    env: {}


# TODO: change to mapping to allow merging.
cronjobs:
  - name: source-typeform
    schedule: "10 * * * *"
    image:
      repository: "ghcr.io/vlab-research/source-typeform"
      tag: "v0.1.2"
      pullPolicy: Always
    env:
      - name: TYPEFORM_BASE_URL
        value: https://api.typeform.com
      - name: TYPEFORM_PAGE_SIZE
        value: "500"
  - name: source-fly
    schedule: "10 * * * *"
    image:
      repository: "ghcr.io/vlab-research/source-fly"
      tag: "v0.1.2"
      pullPolicy: Always
    env:
      - name: FLY_BASE_URL
        value: http://gbv-dashboard/api/v1/
      - name: FLY_PAGE_SIZE
        value: "500"
  - name: source-alchemer
    schedule: "10 * * * *"
    image:
      repository: "ghcr.io/vlab-research/source-alchemer"
      tag: "v0.1.2"
      pullPolicy: Always
    env:
      - name: ALCHEMER_BASE_URL
        value: https://api.alchemer.com
      - name: ALCHEMER_PAGE_SIZE
        value: "100"
  - name: source-qualtrics
    schedule: "20 * * * *"
    image:
      repository: "ghcr.io/vlab-research/source-qualtrics"
      tag: "v0.1.2"
      pullPolicy: Always
    env:
      - name: QUALTRICS_BASE_URL
        value: https://iad1.qualtrics.com
      - name: EXPORT_POLLING_WAIT_TIME
        value: "10"
      - name: EXPORT_POLLING_MAX_ATTEMPTS
        value: "12"
  - name: swoosh
    schedule: "30 * * * *"
    image:
      repository: "ghcr.io/vlab-research/swoosh"
      tag: "v0.1.5"
      pullPolicy: Always
  - name: adopt-ads
    schedule: "30 */2 * * *"
    image:
      repository: "ghcr.io/vlab-research/adopt"
      tag: *vadopt
      pullPolicy: Always
    args:
      - python
      - malaria_ads.py
  - name: adopt-recruitment-data
    schedule: "10 */4 * * *"
    image:
      repository: "ghcr.io/vlab-research/adopt"
      tag: *vadopt
      pullPolicy: Always
    args:
      - python
      - malaria_recruitment.py
  - name: adopt-audience
    schedule: "50 */4 * * *"
    image:
      repository: "ghcr.io/vlab-research/adopt"
      tag: *vadopt
      pullPolicy: Always
    args:
      - python
      - malaria_audience.py
  - name: adopt-heal-reports
    schedule: "0 5 * * *"
    image:
      repository: "ghcr.io/vlab-research/adopt"
      tag: *vadopt
      pullPolicy: Always
    args:
      - python
      - heal_reports.py
    env:
      - name: REPORT_HEALING_DAYS_BACK
        value: "90"



